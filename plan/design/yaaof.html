<!doctype html>
<html lang="en" data-theme="dark" data-density="regular">
<head>
  <meta charset="utf-8" />
  <title>yaaof</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="app/yaaof.css" />
  <script>
    // Tweak defaults — persisted via the host's editmode protocol.
    window.TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "dark",
      "accent": "violet",
      "density": "regular",
      "sidebarPinned": true,
      "onboardGithub": true,
      "onboardKey": true,
      "onboardRepos": true
    }/*EDITMODE-END*/;
    // Set initial theme + density before React mounts to avoid a flash
    document.documentElement.setAttribute('data-theme', window.TWEAKS_DEFAULTS.theme);
    document.documentElement.setAttribute('data-density', window.TWEAKS_DEFAULTS.density);
    // Default route
    if (!window.location.hash) window.location.hash = '#/dashboard';
  </script>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Data + helpers -->
  <script src="app/data.js"></script>
  <script type="text/babel" src="app/icons.jsx"></script>
  <script type="text/babel" src="app/helpers.jsx"></script>
  <script type="text/babel" src="app/shell.jsx"></script>
  <script type="text/babel" src="app/tweaks-panel.jsx"></script>

  <!-- Screens -->
  <script type="text/babel" src="app/screens-tickets.jsx"></script>
  <script type="text/babel" src="app/screens-ticket-detail.jsx"></script>
  <script type="text/babel" src="app/screens-dashboard.jsx"></script>
  <script type="text/babel" src="app/screens-other.jsx"></script>

  <!-- App -->
  <script type="text/babel" src="app/app.jsx"></script>
</body>
</html>
