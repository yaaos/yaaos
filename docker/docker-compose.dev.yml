# Local dev stack — the single docker compose for running yaaos on your laptop.
# Bind-mounts source into the containers so edits + restart pick them up
# without an image rebuild. No auto-reload: avoids the mid-edit crash-loop
# pattern where saving a half-broken multi-file change triggers uvicorn
# --reload to attempt an import and dump a traceback.
#
# Builds the SAME `web` / `worker` stages prod will use — only bind mounts +
# YAAOS_ENV=dev differ, so dev image content matches prod.
#
# Usage:
#   docker compose -f docker/docker-compose.dev.yml --env-file .env up -d --build
#
# Inner loop:
#   Backend change:  docker compose restart app                  (~2-3s)
#   Web change:      pnpm --filter ./apps/web build              (~5-10s, refresh browser)
#   Web auto:        pnpm exec vite build --watch                (separate terminal, ~1-2s per save)
#   Deps change:     docker compose up -d --build app            (~30-60s)
name: yaaos

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: yaaos
      POSTGRES_PASSWORD: yaaos
      POSTGRES_DB: yaaos
    ports:
      - "5432:5432"
    volumes:
      # PG18 images store data under /var/lib/postgresql/<major>/data/ — mount
      # the parent so pg_upgrade --link can work across major versions without
      # crossing a mount-point boundary. See github.com/docker-library/postgres/pull/1259.
      - yaaos-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yaaos -d yaaos"]
      interval: 2s
      timeout: 3s
      retries: 30

  # Mailpit — local SMTP sink for dev. Invitation emails and any other
  # outbound mail land here instead of a real SMTP relay. UI at
  # http://localhost:8025; SMTP on :1025 (point SMTP_HOST/SMTP_PORT there).
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  web:
    image: yaaos-web
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
      target: web
    environment:
      DATABASE_URL: postgresql+asyncpg://yaaos:yaaos@postgres:5432/yaaos
      YAAOS_ENCRYPTION_KEY: ${YAAOS_ENCRYPTION_KEY:?set YAAOS_ENCRYPTION_KEY in .env}
      YAAOS_ENV: dev
      YAAOS_PUBLIC_HOSTNAME: ${YAAOS_PUBLIC_HOSTNAME:-localhost}
      YAAOS_PORT: "8080"
      # `service.name` is split per-role; observability.configure() picks the right field.
      # OTEL_EXPORTER_OTLP_ENDPOINT is intentionally unset — OTel disabled silently
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Optional Braintrust gateway routing for direct LLM calls (core/llm).
      # When BRAINTRUST_API_KEY is set, PromptRunnable injects base_url +
      # api_key + `x-bt-parent` per call; unset = direct provider key via
      # Anthropic SDK with no gateway logging.
      BRAINTRUST_API_KEY: ${BRAINTRUST_API_KEY:-}
      BRAINTRUST_API_URL: ${BRAINTRUST_API_URL:-}
      BRAINTRUST_PROJECT: ${BRAINTRUST_PROJECT:-yaaos}
      # The platform yaaos GitHub App (installs + webhooks). All optional at
      # boot; unset env vars silently disable the install flow.
      YAAOS_GITHUB_APP_ID: ${YAAOS_GITHUB_APP_ID:-}
      YAAOS_GITHUB_APP_SLUG: ${YAAOS_GITHUB_APP_SLUG:-}
      YAAOS_GITHUB_APP_PRIVATE_KEY: ${YAAOS_GITHUB_APP_PRIVATE_KEY:-}
      YAAOS_GITHUB_APP_WEBHOOK_SECRET: ${YAAOS_GITHUB_APP_WEBHOOK_SECRET:-}
      # The platform yaaos GitHub *OAuth App* — distinct from the App above.
      # Unset client_id silently de-registers the OAuth provider so the
      # LoginPage shows "no providers configured" instead of 404ing on GitHub.
      YAAOS_GITHUB_OAUTH_CLIENT_ID: ${YAAOS_GITHUB_OAUTH_CLIENT_ID:-}
      YAAOS_GITHUB_OAUTH_CLIENT_SECRET: ${YAAOS_GITHUB_OAUTH_CLIENT_SECRET:-}
      YAAOS_OAUTH_STATE_SECRET: ${YAAOS_OAUTH_STATE_SECRET:-}
      YAAOS_INVITATION_TOKEN_SECRET: ${YAAOS_INVITATION_TOKEN_SECRET:-}
      YAAOS_TOTP_MASTER_KEY: ${YAAOS_TOTP_MASTER_KEY:-}
      # Dev SMTP sink (Mailpit). Override SMTP_HOST/PORT for prod relays.
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-yaaos@localhost}
      # Redis backs taskiq workflow tasks + sse_pubsub fanout.
      REDIS_URL: ${REDIS_URL}
      # Non-prod: allow the STS verifier to accept the mock-aws host.
      YAAOS_STS_HOST_OVERRIDE: ${YAAOS_STS_HOST_OVERRIDE:-mock-aws:4566}
      # Org seed values — bootstrap reads these to set registered_iam_arn + aws_region
      # on the first org in non-prod without the settings UI.
      YAAOS_DEV_SEED_ARN: ${YAAOS_DEV_SEED_ARN:-arn:aws:iam::000000000000:role/yaaos-dev}
      YAAOS_DEV_SEED_REGION: ${YAAOS_DEV_SEED_REGION:-us-east-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      # Backend source — host edits visible inside the container as
      # soon as the file is saved. `/app/.venv/` is outside this mount
      # so the container's installed deps stay intact.
      - ../apps/backend:/app/apps/backend
      # Built web dist — `StaticFiles` reads from disk per request, so
      # a fresh `pnpm --filter ./apps/web build` on the host shows up
      # immediately on browser refresh. No backend restart needed.
      - ../apps/web/dist:/app/apps/web/dist

  # The worker process runs taskiq's broker consumer + the
  # outbox→Redis drain loop. Without it, every
  # workflow_execution created via `engine.start(...)` sits in `pending`
  # and intake-driven reviews never execute.
  worker:
    image: yaaos-worker
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
      target: worker
    environment:
      DATABASE_URL: postgresql+asyncpg://yaaos:yaaos@postgres:5432/yaaos
      YAAOS_ENCRYPTION_KEY: ${YAAOS_ENCRYPTION_KEY:?set YAAOS_ENCRYPTION_KEY in .env}
      YAAOS_ENV: dev
      YAAOS_PUBLIC_HOSTNAME: ${YAAOS_PUBLIC_HOSTNAME:-localhost}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      BRAINTRUST_API_KEY: ${BRAINTRUST_API_KEY:-}
      BRAINTRUST_API_URL: ${BRAINTRUST_API_URL:-}
      BRAINTRUST_PROJECT: ${BRAINTRUST_PROJECT:-yaaos}
      YAAOS_GITHUB_APP_ID: ${YAAOS_GITHUB_APP_ID:-}
      YAAOS_GITHUB_APP_SLUG: ${YAAOS_GITHUB_APP_SLUG:-}
      YAAOS_GITHUB_APP_PRIVATE_KEY: ${YAAOS_GITHUB_APP_PRIVATE_KEY:-}
      YAAOS_GITHUB_APP_WEBHOOK_SECRET: ${YAAOS_GITHUB_APP_WEBHOOK_SECRET:-}
      YAAOS_GITHUB_OAUTH_CLIENT_ID: ${YAAOS_GITHUB_OAUTH_CLIENT_ID:-}
      YAAOS_GITHUB_OAUTH_CLIENT_SECRET: ${YAAOS_GITHUB_OAUTH_CLIENT_SECRET:-}
      YAAOS_OAUTH_STATE_SECRET: ${YAAOS_OAUTH_STATE_SECRET:-}
      YAAOS_INVITATION_TOKEN_SECRET: ${YAAOS_INVITATION_TOKEN_SECRET:-}
      YAAOS_TOTP_MASTER_KEY: ${YAAOS_TOTP_MASTER_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-yaaos@localhost}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../apps/backend:/app/apps/backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  # Local mock of AWS IMDS + STS for dev/test identity exchange.
  # The agent reads IMDS creds from this service and STS-replays to it;
  # the backend replays the same signed request here to derive the ARN.
  mock-aws:
    build:
      context: ./mock-aws
      dockerfile: Dockerfile
    environment:
      YAAOS_DEV_SEED_ARN: ${YAAOS_DEV_SEED_ARN:-arn:aws:iam::000000000000:role/yaaos-dev}
      YAAOS_DEV_SEED_INSTANCE_ID: ${YAAOS_DEV_SEED_INSTANCE_ID:-dev-task-00000000}
      PORT: "4566"
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4566/latest/meta-data/iam/security-credentials/ -T 2 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 15

  # Local WorkspaceAgent — uses real STS identity exchange against mock-aws.
  agent:
    build:
      context: ../apps/agent
      dockerfile: Dockerfile
    environment:
      YAAOS_BACKEND_URL: http://web:8080
      YAAOS_AGENT_VERSION: dev
      # Direct the AWS SDK v2 IMDS client at mock-aws.
      AWS_EC2_METADATA_SERVICE_ENDPOINT: http://mock-aws:4566
      # Sign GetCallerIdentity against mock-aws. SigV4 binds host into the
      # signature, so the backend must replay against the same URL — its
      # YAAOS_STS_HOST_OVERRIDE allowlists this host.
      YAAOS_STS_ENDPOINT_URL: http://mock-aws:4566/
      # STS override: the backend's sts_verifier allows this host in non-prod.
      YAAOS_STS_HOST_OVERRIDE: mock-aws:4566
    depends_on:
      web:
        condition: service_started
      mock-aws:
        condition: service_healthy

  # Optional OTel collector. Uncomment to enable; set OTEL_EXPORTER_OTLP_ENDPOINT
  # on the `web` service to `http://otel-collector:4317` to wire it up.
  #
  # otel-collector:
  #   image: otel/opentelemetry-collector-contrib:latest
  #   command: ["--config=/etc/otel/config.yaml"]
  #   volumes:
  #     - ./otel-collector.yaml:/etc/otel/config.yaml:ro
  #   ports:
  #     - "4317:4317"   # OTLP gRPC
  #     - "4318:4318"   # OTLP HTTP

volumes:
  yaaos-pgdata:
