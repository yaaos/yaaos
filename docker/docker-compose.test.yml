name: yaaos-test

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yaaos
      POSTGRES_PASSWORD: yaaos
      POSTGRES_DB: yaaos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yaaos -d yaaos"]
      interval: 1s
      timeout: 2s
      retries: 30
    ports:
      - "55432:5432"

  fake-github:
    build:
      context: ..
      dockerfile: apps/fake-github/Dockerfile
    environment:
      GITHUB_WEBHOOK_SECRET: "TEST-FAKE-NOT-FOR-PROD-aaaaaaaaaaaaaaaa"
      # `/apps/{slug}/installations/new` 302's the BROWSER to yaaos's
      # install_callback — must use the host-mapped URL, not the docker
      # service name, so Playwright can follow the redirect.
      YAAOS_CALLBACK_BASE_URL: "http://localhost:58080"
    ports:
      - "58081:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/__test/posted_comments').status == 200 else 1)\""]
      interval: 2s
      timeout: 2s
      retries: 30

  fake-linear:
    build:
      context: ..
      dockerfile: apps/fake-linear/Dockerfile
    ports:
      - "58082:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/docs').status == 200 else 1)\""]
      interval: 2s
      timeout: 2s
      retries: 30

  fake-notion:
    build:
      context: ..
      dockerfile: apps/fake-notion/Dockerfile
    ports:
      - "58083:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/docs').status == 200 else 1)\""]
      interval: 2s
      timeout: 2s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 2s
      retries: 30

  yaaos:
    image: yaaos-web-test
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
      target: web
    environment:
      DATABASE_URL: postgresql+asyncpg://yaaos:yaaos@postgres:5432/yaaos
      REDIS_URL: redis://redis:6379/0
      YAAOS_ENCRYPTION_KEY: vrGOcrqpNIMof1qsuwOEVYvgxo-03dCX8lfVXm_G4JI=
      YAAOS_ENV: test
      GITHUB_API_BASE_URL: http://fake-github:8080
      # Install-picker URL — the BROWSER follows this redirect, so it must
      # be the host-mapped fake-github URL, not the docker service name.
      GITHUB_WEB_BASE_URL: http://localhost:58081
      # The platform yaaos GitHub App credentials. App ID + slug + webhook
      # secret match what fake-github exposes via `/app` and signs outbound
      # webhooks with (see apps/fake-github/app/test_secrets.py).
      # The private key is a sentinel (no "BEGIN" marker) that routes
      # _build_app_jwt to the legacy fake-token branch; fake-github accepts
      # any bearer prefix.
      YAAOS_GITHUB_APP_ID: "12345"
      YAAOS_GITHUB_APP_SLUG: yaaos-test
      YAAOS_GITHUB_APP_PRIVATE_KEY: test-private-key
      YAAOS_GITHUB_APP_WEBHOOK_SECRET: "TEST-FAKE-NOT-FOR-PROD-aaaaaaaaaaaaaaaa"
      YAAOS_GITHUB_OAUTH_CLIENT_ID: yaaos-test-oauth-client-id
      YAAOS_GITHUB_OAUTH_CLIENT_SECRET: yaaos-test-oauth-client-secret
      # Server-side OAuth token POST — yaaos backend must reach fake-github
      # via the docker-internal host, not the browser-facing port.
      YAAOS_GITHUB_OAUTH_TOKEN_URL: http://fake-github:8080/login/oauth/access_token
      # M04 — Linear + Notion fakes. Production URLs are the real upstreams;
      # tests override here so the autonomous suite needs no external OAuth.
      LINEAR_OAUTH_AUTHORIZE_URL: http://fake-linear:8080/oauth/authorize
      LINEAR_OAUTH_TOKEN_URL: http://fake-linear:8080/oauth/token
      LINEAR_OAUTH_REFRESH_URL: http://fake-linear:8080/oauth/token
      LINEAR_MCP_URL: http://fake-linear:8080/sse
      LINEAR_API_BASE_URL: http://fake-linear:8080
      YAAOS_OAUTH_LINEAR_CLIENT_ID: fake-linear-client-id
      YAAOS_OAUTH_LINEAR_CLIENT_SECRET: fake-linear-client-secret
      NOTION_OAUTH_AUTHORIZE_URL: http://fake-notion:8080/v1/oauth/authorize
      NOTION_OAUTH_TOKEN_URL: http://fake-notion:8080/v1/oauth/token
      NOTION_OAUTH_REFRESH_URL: http://fake-notion:8080/v1/oauth/token
      NOTION_MCP_URL: http://fake-notion:8080/mcp
      NOTION_API_BASE_URL: http://fake-notion:8080
      YAAOS_OAUTH_NOTION_CLIENT_ID: fake-notion-client-id
      YAAOS_OAUTH_NOTION_CLIENT_SECRET: fake-notion-client-secret
      YAAOS_CODING_AGENT_STUB: "1"
      YAAOS_REVIEWER_CLASSIFIER_STUB: "1"
      YAAOS_REVIEW_DEBOUNCE_SECONDS: "0"
      YAAOS_REAPER_INTERVAL_SECONDS: "1"
      YAAOS_HEARTBEAT_INTERVAL_SECONDS: "1"
      YAAOS_CATCHUP_DELAY_SECONDS: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fake-github:
        condition: service_started
      fake-linear:
        condition: service_started
      fake-notion:
        condition: service_started
    ports:
      - "58080:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/api/health').status == 200 else 1)\""]
      interval: 2s
      timeout: 2s
      retries: 30
    # No seed script in CMD — e2e specs drive their own preconditions via
    # `/api/testing/*` (see app/testing/e2e_setup). Migrations + built-in
    # reviewer-agent seeding run from FastAPI's lifespan hook.
    command:
      [
        "sh",
        "-c",
        "uvicorn app.main:app --host 0.0.0.0 --port 8080 --app-dir apps/backend",
      ]

  yaaos-worker:
    image: yaaos-worker-test
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
      target: worker
    environment:
      DATABASE_URL: postgresql+asyncpg://yaaos:yaaos@postgres/yaaos
      REDIS_URL: redis://redis:6379/0
      # Encryption key must match the web container — the worker decrypts
      # rows the web wrote.
      YAAOS_ENCRYPTION_KEY: vrGOcrqpNIMof1qsuwOEVYvgxo-03dCX8lfVXm_G4JI=
      YAAOS_ENV: test
      GITHUB_API_BASE_URL: http://fake-github:8080
      GITHUB_WEB_BASE_URL: http://localhost:58081
      YAAOS_GITHUB_APP_ID: "12345"
      YAAOS_GITHUB_APP_SLUG: yaaos-test
      YAAOS_GITHUB_APP_PRIVATE_KEY: test-private-key
      YAAOS_GITHUB_APP_WEBHOOK_SECRET: "TEST-FAKE-NOT-FOR-PROD-aaaaaaaaaaaaaaaa"
      YAAOS_GITHUB_OAUTH_CLIENT_ID: yaaos-test-oauth-client-id
      YAAOS_GITHUB_OAUTH_CLIENT_SECRET: yaaos-test-oauth-client-secret
      YAAOS_GITHUB_OAUTH_TOKEN_URL: http://fake-github:8080/login/oauth/access_token
      LINEAR_API_BASE_URL: http://fake-linear:8080
      NOTION_API_BASE_URL: http://fake-notion:8080
      YAAOS_CODING_AGENT_STUB: "1"
      YAAOS_REVIEWER_CLASSIFIER_STUB: "1"
      YAAOS_REVIEW_DEBOUNCE_SECONDS: "0"
      YAAOS_REAPER_INTERVAL_SECONDS: "1"
      YAAOS_HEARTBEAT_INTERVAL_SECONDS: "1"
      YAAOS_CATCHUP_DELAY_SECONDS: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "cd apps/backend && python bin/worker",
      ]
