name: yaaos

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yaaos
      POSTGRES_PASSWORD: yaaos
      POSTGRES_DB: yaaos
    ports:
      - "5432:5432"
    volumes:
      - yaaos-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yaaos -d yaaos"]
      interval: 2s
      timeout: 3s
      retries: 30

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://yaaos:yaaos@postgres:5432/yaaos
      YAAOS_ENCRYPTION_KEY: ${YAAOS_ENCRYPTION_KEY:?set YAAOS_ENCRYPTION_KEY in .env}
      YAAOS_ENV: ${YAAOS_ENV:-prod}
      YAAOS_PORT: "8080"
      OTEL_SERVICE_NAME: yaaos
      # OTEL_EXPORTER_OTLP_ENDPOINT is intentionally unset — OTel disabled silently
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Optional Braintrust gateway routing for direct LLM calls (core/llm).
      # When BRAINTRUST_API_KEY is set, PromptRunnable injects base_url +
      # api_key + `x-bt-parent` per call; unset = direct provider key via
      # Anthropic SDK with no gateway logging.
      BRAINTRUST_API_KEY: ${BRAINTRUST_API_KEY:-}
      BRAINTRUST_API_URL: ${BRAINTRUST_API_URL:-}
      BRAINTRUST_PROJECT: ${BRAINTRUST_PROJECT:-yaaos}
      # M02 — user-login OAuth + token-signing + TOTP. All optional at boot;
      # an unset GitHub client_id silently de-registers the provider so the
      # LoginPage shows "no providers configured" instead of 404ing on GitHub.
      YAAOS_OAUTH_GITHUB_CLIENT_ID: ${YAAOS_OAUTH_GITHUB_CLIENT_ID:-}
      YAAOS_OAUTH_GITHUB_CLIENT_SECRET: ${YAAOS_OAUTH_GITHUB_CLIENT_SECRET:-}
      YAAOS_OAUTH_STATE_SECRET: ${YAAOS_OAUTH_STATE_SECRET:-}
      YAAOS_INVITATION_TOKEN_SECRET: ${YAAOS_INVITATION_TOKEN_SECRET:-}
      YAAOS_TOTP_MASTER_KEY: ${YAAOS_TOTP_MASTER_KEY:-}
      # M02 — dev SMTP sink (Mailpit). Override SMTP_HOST/PORT for prod relays.
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-yaaos@localhost}
      # M05 — Redis backs taskiq workflow tasks + sse_pubsub fanout.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  # Optional OTel collector. Uncomment to enable; set OTEL_EXPORTER_OTLP_ENDPOINT
  # on the `app` service to `http://otel-collector:4317` to wire it up.
  #
  # otel-collector:
  #   image: otel/opentelemetry-collector-contrib:latest
  #   command: ["--config=/etc/otel/config.yaml"]
  #   volumes:
  #     - ./otel-collector.yaml:/etc/otel/config.yaml:ro
  #   ports:
  #     - "4317:4317"   # OTLP gRPC
  #     - "4318:4318"   # OTLP HTTP

volumes:
  yaaos-pgdata:
