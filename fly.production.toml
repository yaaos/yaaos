# Fly.io deployment manifest — yaaos production (app.yaaos.dev).
#
# One app, two process groups (api + worker) built from the shared backend
# image (apps/backend/Dockerfile). The `web` and `worker` stages differ only
# in CMD, so we build the `web` target and let [processes] supply each group's
# command; the tini ENTRYPOINT is preserved, so SIGTERM still reaches the
# Python child.
#
# Deployed by the `deploy-production` task in .rwx/push.yml (flyctl deploy
# --remote-only — builds amd64 on Fly's remote builder).
#
# Config placement: non-secrets live here in [env]; credentials/keys/tokens
# are set via `fly secrets` (encrypted, never in git). Never define the same
# var in both — a secret silently overrides an [env] value of the same name.

app = "yaaos"
primary_region = "ord"

# Graceful-shutdown budget: covers the worker drain grace (60s) + uvicorn
# timeout_graceful_shutdown (30s) + worst-case OTel flush across all three
# providers (~90s serial). Fly's hard-kill cap is 300s.
kill_timeout = "180s"

# Default strategy is bluegreen — used for the api process group, which has
# an [http_service] block and a health check Fly can gate cutover on. The
# worker process group is deployed separately by the rwx deploy task with
# `flyctl deploy --process-groups worker --strategy rolling`. Reason:
# bluegreen's "promote green to live" trigger is the http_service health
# check, and the worker has no [http_service]. Bluegreen creates the new
# worker machine in `stopped` state and never sends it a `start` after
# cutover, so a bluegreen worker deploy ships a stopped worker every time
# (observed in v25/v26; see community thread
# https://community.fly.io/t/when-a-bluegreen-deploy-fails-i-end-up-with-extra-machines/20914).
# Rolling deploys the existing worker machine in place, which avoids the
# bug entirely.
[deploy]
  strategy = "bluegreen"

[build]
  dockerfile = "apps/backend/Dockerfile"
  target = "web"

[env]
  APP_MODE = "production"
  ENVIRONMENT = "production"
  # Full external origin. Derives the public link base (yaaos_app_base_url) and
  # the agent identity-exchange audience (yaaos_public_hostname).
  YAAOS_PUBLIC_ORIGIN = "https://app.yaaos.dev"

  # Non-secret GitHub identifiers — they appear in browser URLs / settings
  # pages, so they belong here in [env], not in `fly secrets`. The matching
  # *secrets* (private key, webhook secret, OAuth client secret) stay in
  # `fly secrets`.
  YAAOS_GITHUB_APP_ID = "3983378"
  YAAOS_GITHUB_APP_SLUG = "yaaos"
  YAAOS_GITHUB_OAUTH_CLIENT_ID = "Ov23liOakRow3PX62StR"

  # Dash0 OTLP ingest. Endpoint and dataset are non-secret (public URLs /
  # dataset names). The two bearer tokens — one for the backend, one for the
  # agent — are sensitive and stay in `fly secrets` as
  # YAAOS_BACKEND_DASH0_BEARER_TOKEN and YAAOS_AGENT_DASH0_BEARER_TOKEN.
  YAAOS_DASH0_ENDPOINT = "https://ingress.us-west-2.aws.dash0.com"
  YAAOS_DASH0_DATASET = "default"

  # SMTP non-secret identifiers (SMTP_HOST/PORT/USERNAME/USE_TLS/FROM) remain
  # set in the Fly dashboard env for now; SMTP_PASSWORD stays a secret.

# ── api: FastAPI/uvicorn HTTP + SSE ──────────────────────────────────────
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  min_machines_running = 1
  processes = ["api"]

  # Fly's internal checker hits the machine directly (not via Cloudflare), so
  # /api/health stays reachable. Generous grace_period: the web process runs
  # migrate() (advisory-locked) during lifespan startup before the HTTP server
  # accepts connections.
  [[http_service.checks]]
    interval = "15s"
    timeout = "3s"
    grace_period = "45s"
    method = "GET"
    path = "/api/health"

# ── worker: task consumer (no public HTTP; health checked on 6PN-private port 8081) ──
# Top-level [[checks]] (NOT [[services]]) is the Fly-recommended shape for
# background workers per fly.io/docs/blueprints/seamless-deployments — non-
# public services use top-level checks "for observability, not traffic
# control." The check exists for operational visibility (Fly will restart a
# wedged worker whose /health returns 503) but does not gate deployment;
# worker deploys use --strategy rolling, see the [deploy] comment above.
#
# The worker count is operator-set via `flyctl scale count worker=1`;
# autoscaling knobs (auto_stop_machines / min_machines_running) belong on
# [[services]] / [http_service] and aren't needed here.
[checks.worker_health]
  processes = ["worker"]
  port = 8081
  type = "http"
  interval = "15s"
  timeout = "3s"
  grace_period = "30s"
  method = "GET"
  path = "/health"

# ── process commands (override image CMD; tini entrypoint preserved) ──────
[processes]
  api = "python apps/backend/app/web.py"
  worker = "python apps/backend/app/worker.py"

# Single small machine per group (fixed 1+1, no autoscaling).
# 1 GB: matches observed peak RSS for web + worker under normal load.
# Tune if observed load warrants.
[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
