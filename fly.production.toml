# Fly.io deployment manifest — yaaos production (app.yaaos.cloud).
#
# One app, two process groups (web + worker) built from the shared backend
# image (apps/backend/Dockerfile). The `web` and `worker` stages differ only
# in CMD, so we build the `web` target and let [processes] supply each group's
# command; the tini ENTRYPOINT is preserved, so SIGTERM still reaches the
# Python child.
#
# Deployed by the `deploy-prod` task in .rwx/push.yml (flyctl deploy
# --remote-only — builds amd64 on Fly's remote builder).
#
# Config placement: non-secrets live here in [env]; credentials/keys/tokens
# are set via `fly secrets` (encrypted, never in git). Never define the same
# var in both — a secret silently overrides an [env] value of the same name.

app = "yaaos"
primary_region = "ord"

# Graceful-shutdown budget: 30s lets uvicorn drain in-flight HTTP on the web
# group. Raise this when worker graceful drain + OTel flush budget lands.
kill_timeout = "30s"

# Rolling deploy — changed to bluegreen once worker graceful drain + health-503
# gate land (both process groups need a passing health check for bluegreen to
# cut over; the worker health check added below satisfies the worker side).
[deploy]
  strategy = "rolling"

[build]
  dockerfile = "apps/backend/Dockerfile"
  target = "web"

[env]
  APP_MODE = "production"
  ENVIRONMENT = "production"
  # Full external origin. Derives the public link base (yaaos_app_base_url) and
  # the agent identity-exchange audience (yaaos_public_hostname).
  YAAOS_PUBLIC_ORIGIN = "https://app.yaaos.cloud"

  # Non-secret GitHub identifiers — they appear in browser URLs / settings
  # pages, so they belong here in [env], not in `fly secrets`. The matching
  # *secrets* (private key, webhook secret, OAuth client secret) stay in
  # `fly secrets`.
  YAAOS_GITHUB_APP_ID = "3983378"
  YAAOS_GITHUB_APP_SLUG = "yaaos"
  YAAOS_GITHUB_OAUTH_CLIENT_ID = "Ov23liOakRow3PX62StR"

  # SMTP non-secret identifiers (SMTP_HOST/PORT/USERNAME/USE_TLS/FROM) remain
  # set in the Fly dashboard env for now; SMTP_PASSWORD stays a secret.

# ── web: FastAPI/uvicorn HTTP + SSE ──────────────────────────────────────
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  min_machines_running = 1
  processes = ["web"]

  # Fly's internal checker hits the machine directly (not via Cloudflare), so
  # /api/health stays reachable. Generous grace_period: the web process runs
  # migrate() (advisory-locked) during lifespan startup before the HTTP server
  # accepts connections.
  [[http_service.checks]]
    interval = "15s"
    timeout = "3s"
    grace_period = "45s"
    method = "GET"
    path = "/api/health"

# ── worker: task consumer (no public HTTP; health checked on 6PN-private port 8081) ──
# The worker health server binds 0.0.0.0:8081 — no [http_service] (no public
# ingress needed). The [[services]] block declares the port so Fly can route
# internal checks to it and so the machine checker can reach it directly
# (bypassing Cloudflare, which would 403 the probe).
[[services]]
  processes = ["worker"]
  internal_port = 8081
  protocol = "tcp"
  auto_stop_machines = "off"
  min_machines_running = 1

  [[services.http_checks]]
    interval = "15s"
    timeout = "3s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

# ── process commands (override image CMD; tini entrypoint preserved) ──────
[processes]
  web = "python apps/backend/app/web.py"
  worker = "python apps/backend/app/worker.py"

# Single small machine per group (fixed 1+1, no autoscaling).
# 1 GB floor: Claude Code CLI and its Node runtime are memory-hungry.
# Tune if observed load warrants.
[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
