on:
  github:
    push:
      init:
        commit-sha: ${{ event.git.sha }}
  cli:
    init:
      commit-sha: ${{ event.git.sha }}

base:
  image: ubuntu:24.04
  config: rwx/base 1.0.2

tasks:
  - key: code
    call: git/clone 2.0.7
    with:
      repository: https://github.com/JackKora/yaaos.git
      ref: ${{ init.commit-sha }}

  # Each CI task uses `filter:` so only the matching files are present on
  # disk AND contribute to the task's cache key. Without a filter, every
  # push busts every task (the workspace tree from `code` is hashed
  # whole). See https://www.rwx.com/docs/filtering-files.

  - key: backend-ci
    use: [code]
    filter:
      - apps/backend/**
      - pyproject.toml
      - uv.lock
      - docker/docker-compose.test.yml
      - .rwx/push.yml
    docker: true
    # Docker is on ONLY so `docker compose` can bring up the postgres +
    # redis services backend tests need. The test runner itself runs
    # natively on the Ubuntu runner — uv + python on the host, pytest
    # connects to compose-bound localhost ports. Compose maps postgres to
    # host :55432 and redis to host :56379 (see docker-compose.test.yml).
    run: |
      set -e
      apt-get update
      apt-get install -y --no-install-recommends \
        python3.13 python3.13-venv \
        libxmlsec1-dev xmlsec1 pkg-config libxml2-dev libxslt1-dev \
        curl ca-certificates
      curl -LsSf https://astral.sh/uv/install.sh | sh
      export PATH="$HOME/.local/bin:$PATH"
      docker compose -f docker/docker-compose.test.yml up -d --wait postgres redis
      trap "docker compose -f docker/docker-compose.test.yml down -v" EXIT
      export DATABASE_URL="postgresql+asyncpg://yaaos:yaaos@localhost:55432/yaaos"
      export REDIS_URL="redis://localhost:56379/0"
      export YAAOS_ENV=dev
      cd apps/backend && bin/ci
    outputs:
      test-results:
        - path: apps/backend/tmp/pytest-reportlog.json
          options:
            language: Python
            framework: pytest

  - key: docs-ci
    use: [code]
    # Unfiltered: walks markdown across the whole repo and resolves link
    # targets via `git ls-files`, so a restrictive filter risks false
    # negatives on linked non-markdown files. Cheapest task (pure Python
    # stdlib, no Docker) — filtering isn't worth the correctness risk.
    run: |
      python3 apps/backend/bin/check_doc_links

  - key: web-ci
    use: [code]
    filter:
      - apps/web/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .rwx/push.yml
    run: |
      set -e
      apt-get update
      apt-get install -y --no-install-recommends curl ca-certificates gnupg
      curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      apt-get install -y --no-install-recommends nodejs
      corepack enable
      corepack prepare pnpm@9.12.3 --activate
      pnpm install --frozen-lockfile
      cd apps/web && bin/ci
    outputs:
      test-results:
        - path: apps/web/tmp/vitest.json
          options:
            language: JavaScript
            framework: Vitest

  - key: agent-ci
    use: [code]
    filter:
      - apps/agent/**
      - apps/backend/openapi/agent-api.yaml
      - .rwx/push.yml
    # Go is hermetic — runs natively on the Ubuntu runner. Tooling
    # installed inline: golangci-lint (official install script,
    # v2.x), govulncheck (go install), semgrep (pip). CGO + race
    # detector work on Ubuntu's default gcc.
    run: |
      set -e
      apt-get update
      apt-get install -y --no-install-recommends \
        curl ca-certificates git build-essential python3-pip
      curl -fsSL https://go.dev/dl/go1.25.0.linux-amd64.tar.gz | tar -C /usr/local -xz
      export PATH="/usr/local/go/bin:$(go env GOPATH 2>/dev/null || echo $HOME/go)/bin:$PATH"
      curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
        | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
      go install golang.org/x/vuln/cmd/govulncheck@latest
      pip install --break-system-packages --quiet semgrep
      cd apps/agent && bin/ci

  - key: web-security
    use: [code]
    filter:
      - apps/web/src/**
      - .semgrepignore
      - .rwx/push.yml
    run: |
      set -e
      apt-get update
      apt-get install -y --no-install-recommends python3-pip
      pip install --break-system-packages --quiet semgrep
      semgrep scan \
        --config p/typescript \
        --config p/react \
        --config p/owasp-top-ten \
        --error \
        --metrics off \
        --quiet \
        apps/web/src
