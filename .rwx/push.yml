on:
  github:
    push:
      init:
        commit-sha: ${{ event.git.sha }}
  cli:
    init:
      commit-sha: ${{ event.git.sha }}

base:
  image: ubuntu:24.04
  config: rwx/base 1.0.2

tasks:
  - key: code
    call: git/clone 2.0.7
    with:
      repository: https://github.com/JackKora/yaaos.git
      ref: ${{ init.commit-sha }}

  # No filters: RWX caches at the task level (same code SHA + same run script =
  # task skipped entirely) and Docker's BuildKit cache inside the persistent
  # `docker: true` daemon handles incremental rebuilds. Filter lists are a
  # maintenance trap and would have missed the cross-stage `COPY --from=
  # web-builder` dependency on the web inputs anyway.

  - key: backend-ci
    use: [code]
    docker: true
    # bin/check_doc_links walks the whole repo's docs and verifies cross-app
    # links resolve. The prod image only ships `apps/backend` (line 60 of the
    # Dockerfile), so we read-only-mount the other doc trees + `plan/` + the
    # repo root markdown files so the check can see them. No image change —
    # production images stay lean.
    #
    # bin/ci's pytest also exercises real Postgres (transactional rollback
    # pattern per apps/backend/docs/patterns.md). We bring up the postgres
    # service from docker-compose.test.yml, run backend-ci on the same compose
    # network, and tear it down on exit.
    #
    # apps/backend/tmp is mounted writable so the pytest-reportlog file
    # produced inside the container survives `--rm` and is picked up by
    # outputs.test-results. The mount is chmod 777 because the container
    # runs as uid 1000 (yaaos), which won't match the RWX runner uid.
    run: |
      mkdir -p apps/backend/tmp && chmod 777 apps/backend/tmp
      docker compose -f docker/docker-compose.test.yml up -d --wait postgres
      trap "docker compose -f docker/docker-compose.test.yml down -v" EXIT
      docker build -f docker/Dockerfile --target backend-ci -t yaaos-backend-ci .
      docker run --rm \
        --network yaaos-test_default \
        -e DATABASE_URL=postgresql+asyncpg://yaaos:yaaos@postgres:5432/yaaos \
        -e YAAOS_ENV=dev \
        -v "$(pwd)/docs:/app/docs:ro" \
        -v "$(pwd)/docker:/app/docker:ro" \
        -v "$(pwd)/plan:/app/plan:ro" \
        -v "$(pwd)/CLAUDE.md:/app/CLAUDE.md:ro" \
        -v "$(pwd)/apps/web/docs:/app/apps/web/docs:ro" \
        -v "$(pwd)/apps/e2e/docs:/app/apps/e2e/docs:ro" \
        -v "$(pwd)/apps/fake-github/docs:/app/apps/fake-github/docs:ro" \
        -v "$(pwd)/apps/backend/tmp:/app/apps/backend/tmp" \
        yaaos-backend-ci sh -c "cd apps/backend && bin/ci"
    outputs:
      test-results:
        - path: apps/backend/tmp/pytest-reportlog.json
          options:
            language: Python
            framework: pytest

  - key: web-ci
    use: [code]
    docker: true
    # apps/web/tmp is mounted writable so vitest's JSON reporter output
    # survives `--rm` and is picked up by outputs.test-results.
    run: |
      mkdir -p apps/web/tmp && chmod 777 apps/web/tmp
      docker build -f docker/Dockerfile --target web-builder -t yaaos-web-ci .
      docker run --rm \
        -v "$(pwd)/apps/web/tmp:/build/apps/web/tmp" \
        yaaos-web-ci sh -c "cd apps/web && bin/ci"
    outputs:
      test-results:
        - path: apps/web/tmp/vitest.json
          options:
            language: JavaScript
            framework: Vitest

  - key: web-security
    use: [code]
    docker: true
    # Semgrep scan against the web source. Runs in the OFFICIAL
    # `semgrep/semgrep` Docker image — no dependency on the backend image
    # or its dev deps. The web-builder Docker stage is node-only and can't
    # host semgrep directly; the official image is the cleanest way to run
    # the scanner without coupling the web pipeline to backend tooling.
    run: |
      docker run --rm \
        -v "$(pwd)/apps/web/src:/scan/src:ro" \
        -v "$(pwd)/.semgrepignore:/scan/.semgrepignore:ro" \
        -w /scan \
        semgrep/semgrep:latest semgrep scan \
          --config p/typescript \
          --config p/react \
          --config p/owasp-top-ten \
          --error \
          --metrics off \
          --quiet \
          /scan/src
