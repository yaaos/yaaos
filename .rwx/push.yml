on:
  github:
    push:
      init:
        commit-sha: ${{ event.git.sha }}
        branch: ${{ event.git.branch }}
      status-checks:
        name: CI
  cli:
    init:
      commit-sha: ${{ event.git.sha }}
      branch: ${{ event.git.branch }}

base:
  image: ubuntu:24.04
  config: rwx/base 1.0.2
  arch: arm64

# Coalesce rapid pushes per branch: a new push cancels any older run for the
# same branch that's still waiting in the queue. In-flight runs keep going —
# we don't want `cancel-running` interrupting `deploy-production` mid-flytcl.
concurrency-pools:
  - id: yaaos/yaaos:${{ init.branch }}
    capacity: 1
    on-overflow: cancel-waiting

# Tool-cache vault. Each install-running task (ci-web, ci-e2e) declares
# its own tool-cache name; RWX preserves the post-install workspace
# state across runs of that same task so `pnpm install` and Playwright's
# browser download don't re-download on every push. The vault scopes
# what reads/writes the cache.
#
# The `yaaos` vault is configured for `yaaos/yaaos:*` (every branch
# can read AND write), so feature-branch pushes also benefit from and
# contribute to the cache. The RWX-default pattern of scoping to `main`
# (read-only for feature branches) exists to guard against malicious
# PRs poisoning the cache; we accept that risk for the convenience of
# fast feature-branch CI.
tool-cache:
  vault: yaaos

# Per the RWX CI reference (https://www.rwx.com/docs/guides/ci): toolchain
# installs (python, nodejs, golang) are their own top-level tasks so RWX
# caches each install layer separately.
#
# Filters intentionally do NOT include `.rwx/push.yml` — RWX already
# hashes each task's own definition into its cache key, so an edit to
# this file invalidates only the task whose YAML actually changed.
# Including the file in every filter would invalidate every task on any
# config edit (which is what was making ci-backend / ci-agent re-run
# unnecessarily).

tasks:
  - key: code
    call: git/clone 2.0.7
    with:
      repository: https://github.com/yaaos/yaaos.git
      ref: ${{ init.commit-sha }}

  - key: ci-docs
    use: [code]
    # Unfiltered: walks markdown across the whole repo and resolves link
    # targets via `git ls-files`, so a restrictive filter risks false
    # negatives on linked non-markdown files. Cheap task — pure Python
    # stdlib, no Docker.
    run: |
      python3 apps/backend/bin/check_doc_links

  # ─── backend ────────────────────────────────────────────────────────

  - key: system-packages-backend
    # Backend's python-xmlsec binds to libxmlsec1 + libxml2/libxslt at
    # build time. Only the backend CI needs these.
    run: |
      sudo apt-get update
      sudo apt-get install -y --no-install-recommends \
        libxmlsec1-dev xmlsec1 pkg-config libxml2-dev libxslt1-dev
      sudo apt-get clean

  - key: python
    # python is the backend's primary toolchain; ci-web and ci-agent also
    # `use:` it for the semgrep step. Pinned to 3.14.5 to match the
    # project's `requires-python = ">=3.14,<3.15"`. The `python/install`
    # package requires a full patch version (not "3.14") and Ubuntu 24.04
    # has 3.14 available per known-pythons-os-base.csv.
    call: python/install 1.4.4
    with:
      python-version: "3.14.5"

  - key: ci-backend
    use: [code, system-packages-backend, python]
    filter:
      - apps/backend/**
      - pyproject.toml
      - uv.lock
      - docker/docker-compose.test.yml
    docker: preserve-data
    # Docker is on only so `docker compose` can bring up postgres + redis
    # services. The test runner itself runs natively on the agent.
    # Compose maps postgres → host :55432 and redis → host :56379 (see
    # docker-compose.test.yml). `preserve-data` keeps the pulled postgres
    # and redis images in the Docker daemon's store across runs.
    run: |
      set -e
      # Capture compose file as an absolute path BEFORE any `cd`, so the
      # EXIT trap finds it after bin/ci cds into apps/backend/.
      COMPOSE_FILE="$(pwd)/docker/docker-compose.test.yml"
      curl -LsSf https://astral.sh/uv/install.sh | sh
      export PATH="$HOME/.local/bin:$PATH"
      docker compose -f "$COMPOSE_FILE" up -d --wait postgres redis
      trap "docker compose -f '$COMPOSE_FILE' down -v" EXIT
      export DATABASE_URL="postgresql+asyncpg://yaaos:yaaos@localhost:55432/yaaos"
      export REDIS_URL="redis://localhost:56379/0"
      export APP_MODE=dev
      cd apps/backend && bin/ci
    outputs:
      test-results:
        - path: apps/backend/tmp/pytest-reportlog.json
          options:
            language: Python
            framework: pytest

  # ─── web ────────────────────────────────────────────────────────────

  - key: nodejs
    call: nodejs/install 1.1.14
    with:
      node-version: "24.16.0"

  - key: ci-web
    use: [code, nodejs, python]
    tool-cache: ci-web-pnpm
    filter:
      - apps/web/**
      # bin/ci runs gen-api-types --check against the committed spec.
      - apps/backend/openapi/web-api.json
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .npmrc
      - .semgrepignore
    # `python` is `use:`d here so semgrep (run from apps/web/bin/ci) is
    # available. `tool-cache` preserves node_modules across runs of this
    # task — pnpm's incremental install reuses the prior state.
    run: |
      set -e
      pip install --quiet semgrep
      corepack enable
      corepack prepare pnpm@9.12.3 --activate
      pnpm install --frozen-lockfile
      cd apps/web && bin/ci
    outputs:
      test-results:
        - path: apps/web/tmp/vitest.json
          options:
            language: JavaScript
            framework: Vitest

  # ─── agent ──────────────────────────────────────────────────────────

  - key: golang
    call: golang/install 1.2.1
    with:
      go-version: "1.26.4"

  - key: ci-agent
    use: [code, golang, python]
    filter:
      - apps/agent/**
      - apps/backend/openapi/agent-api.yaml
    # Go is hermetic — runs natively. Tooling installed inline:
    # golangci-lint (official install script, v2.x), govulncheck
    # (go install), semgrep (pip). CGO + race detector work on Ubuntu's
    # default gcc, so the alpine-specific CGO_ENABLED=1 from the old
    # Docker-based config is no longer needed.
    run: |
      set -e
      export PATH="/usr/local/go/bin:$(go env GOPATH 2>/dev/null || echo $HOME/go)/bin:$PATH"
      curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
        | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
      go install golang.org/x/vuln/cmd/govulncheck@latest
      pip install --quiet semgrep
      cd apps/agent && bin/ci

  # ─── e2e ────────────────────────────────────────────────────────────

  - key: ci-e2e
    if: ${{ init.branch == 'main' }}
    use: [code, nodejs]
    tool-cache: ci-e2e-pnpm
    # Broad filter: e2e exercises the integrated test compose stack —
    # backend (web + worker images), web (SPA baked into the image), the
    # three fake-* services, the local WorkspaceAgent + its mock-aws STS
    # endpoint (both built by docker-compose.test.yml), the fake-claude
    # CLI the agent bind-mounts at /usr/local/bin/claude, the compose file
    # itself, and workspace lockfiles. Every build context AND bind-mount
    # source the compose references must be in this filter — RWX only
    # materializes filtered paths into the task workspace, so a missing
    # path fails the build (missing context) or container start (missing
    # mount source).
    filter:
      - apps/backend/**
      - apps/web/**
      - apps/e2e/**
      - apps/agent/**
      - apps/fake-claude/**
      - apps/fake-github/**
      - apps/fake-linear/**
      - apps/fake-notion/**
      - docker/docker-compose.test.yml
      - docker/mock-aws/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .npmrc
      - pyproject.toml
      - uv.lock
    docker: true
    # Docker is on so `apps/e2e/bin/ci` can `docker compose up --build`
    # the test stack. Playwright runs natively on the agent.
    # `tool-cache` preserves node_modules + ~/.cache/ms-playwright/
    # across runs. The Docker daemon's image store is NOT preserved:
    # measurements showed zero CACHED layers on real runs (BuildKit
    # cache location + `ghcr.io/astral-sh/uv:latest` digest checks
    # invalidate everything), while the post-run snapshot upload was
    # 40–120s and growing. Cold rebuild is ~32s — faster than the
    # upload it replaced.
    run: |
      set -e
      corepack enable
      corepack prepare pnpm@9.12.3 --activate
      pnpm install --frozen-lockfile
      pnpm --filter @yaaos/e2e exec playwright install --with-deps chromium
      apps/e2e/bin/ci
    outputs:
      test-results:
        - path: apps/e2e/tmp/playwright.json
          options:
            language: JavaScript
            framework: Playwright

  # ─── deploy ──────────────────────────────────────────────────────────
  #
  # Deploys to Fly.io on green CI for `main`. The five CI tasks (docs/backend/
  # web/agent/e2e) run in parallel; `after:` gates this task on ALL of them
  # SUCCEEDING (ordering-only — unlike `use`, it does not merge their
  # filesystems); `use: [code]` supplies the source as the Docker build
  # context. `--remote-only` builds the amd64 image on Fly's remote builder
  # (this RWX runner is arm64), so no Docker is needed in the task. The app +
  # process groups + build target + deploy strategy are declared in the
  # repo-root fly.production.toml. FLY_API_TOKEN is read from the `yaaos` vault.
  - key: deploy-production
    if: ${{ init.branch == 'main' }}
    after: [ci-docs, ci-backend, ci-web, ci-agent, ci-e2e]
    use: [code]
    # Filter matches the inputs apps/backend/Dockerfile actually consumes —
    # backend + web sources plus the Python/pnpm workspace manifests and the
    # fly config itself. Agent-only pushes (apps/agent/**) skip this task
    # since they don't change the deployed Fly image; publish-agent-image
    # below handles them.
    filter:
      - apps/backend/**
      - apps/web/**
      - pyproject.toml
      - uv.lock
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .npmrc
      - fly.production.toml
    env:
      FLY_API_TOKEN: ${{ vaults.yaaos.secrets.FLY_API_TOKEN }}
    run: |
      set -e
      curl -L https://fly.io/install.sh | sh
      export FLYCTL_INSTALL="$HOME/.fly"
      export PATH="$FLYCTL_INSTALL/bin:$PATH"
      flyctl deploy --remote-only --config fly.production.toml \
        --build-arg VITE_OTEL_COLLECTOR_ENDPOINT=https://ingress.us-west-2.aws.dash0.com \
        --build-arg VITE_DASH0_AUTH_TOKEN=${{ vaults.yaaos.secrets.VITE_DASH0_AUTH_TOKEN }} \
        --build-arg VITE_DASH0_DATASET=default \
        --build-arg VITE_SERVICE_VERSION=${{ init.commit-sha }} \
        --build-arg VITE_ENVIRONMENT=production

      # Destroy stopped workers from older releases — bluegreen leftovers
      # whose destroy step didn't complete. Bluegreen owns active-machine
      # state; this only cleans up stale spares. Idempotent.
      MAX_VER="$(flyctl machine list -a yaaos --json | jq -r '[.[] | (.config.metadata.fly_release_version // "0") | tonumber] | max')"
      echo "Reaping older-release worker machines (current: ${MAX_VER})"
      flyctl machine list -a yaaos --json \
        | jq -r --argjson max "$MAX_VER" '.[] | select(.config.metadata.fly_process_group == "worker" and .state == "stopped" and ((.config.metadata.fly_release_version // "0") | tonumber) < $max) | .id' \
        | xargs -r -n1 -I{} flyctl machine destroy --force {} -a yaaos

  # ─── agent image publish ─────────────────────────────────────────────
  #
  # Publishes the WorkspaceAgent image to Docker Hub on every `main` push
  # that changes `apps/agent/**`. Reads the major version from the
  # committed `apps/agent/VERSION` file and derives the minor by querying
  # existing Docker Hub tags for the current major — true +1-per-release,
  # no git topology needed. Builds linux/arm64 natively (this RWX runner
  # is arm64; yaaos customers run arm64 hosts so we publish arm64 only).
  # The task fails if the computed tag
  # already exists (race guard for concurrent publishes). Docker Hub repo:
  # yaaos/agent. Creds from the `yaaos` vault.
  - key: publish-agent-image
    if: ${{ init.branch == 'main' }}
    after: [ci-docs, ci-backend, ci-web, ci-agent, ci-e2e]
    use: [code]
    filter:
      - apps/agent/**
    docker: true
    env:
      DOCKERHUB_USERNAME: ${{ vaults.yaaos.secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ vaults.yaaos.secrets.DOCKERHUB_TOKEN }}
    run: |
      set -e

      # --- 1. Read the major version from the committed VERSION file. ---
      MAJOR="$(cat apps/agent/VERSION | tr -d '[:space:]')"
      echo "Major version: ${MAJOR}"

      # --- 2. List existing Docker Hub tags and derive the next minor. ---
      # Paginate through all tags (page_size=100) and collect those
      # matching MAJOR.* . If none exist yet, MINOR=0.
      DOCKER_HUB_REPO="yaaos/agent"
      NEXT_PAGE="https://hub.docker.com/v2/repositories/${DOCKER_HUB_REPO}/tags/?page_size=100"
      MAX_MINOR=-1

      # `-sSL` (no `-f`): on the very first publish the repo does not exist
      # yet, so Docker Hub returns 404. We treat that as "no tags" and let
      # MINOR fall through to 0 rather than failing the task.
      while [ -n "${NEXT_PAGE}" ] && [ "${NEXT_PAGE}" != "null" ]; do
        RESPONSE="$(curl -sSL "${NEXT_PAGE}")"
        # Extract tag names matching MAJOR.<digits> exactly.
        MATCHING="$(echo "${RESPONSE}" | jq -r --arg major "${MAJOR}" \
          '.results[].name | select(test("^" + $major + "\\.[0-9]+$"))' 2>/dev/null || true)"
        for tag in ${MATCHING}; do
          minor="${tag#${MAJOR}.}"
          if [ "${minor}" -gt "${MAX_MINOR}" ] 2>/dev/null; then
            MAX_MINOR="${minor}"
          fi
        done
        NEXT_PAGE="$(echo "${RESPONSE}" | jq -r '.next // empty' 2>/dev/null || true)"
      done

      MINOR=$(( MAX_MINOR + 1 ))
      VERSION="${MAJOR}.${MINOR}"
      echo "Computed version: ${VERSION} (max existing minor was ${MAX_MINOR})"

      # --- 3. Race guard: fail if the tag already exists. ---
      # Re-query to catch a concurrent publish that just pushed the same tag.
      EXISTING="$(curl -fsSL \
        "https://hub.docker.com/v2/repositories/${DOCKER_HUB_REPO}/tags/${VERSION}/" \
        2>/dev/null | jq -r '.name // empty' 2>/dev/null || true)"
      if [ -n "${EXISTING}" ]; then
        echo "ERROR: tag ${VERSION} already exists on Docker Hub — concurrent publish detected. Rerun to pick the next minor." >&2
        exit 1
      fi

      # --- 4. Authenticate and build for linux/arm64. ---
      # This RWX runner is arm64 and yaaos customers run arm64 hosts,
      # so we build natively (no QEMU) and publish arm64 only.
      echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

      docker buildx create --use --name agent-builder 2>/dev/null || true
      docker buildx build \
        --platform linux/arm64 \
        --build-arg VERSION="${VERSION}" \
        --tag "${DOCKER_HUB_REPO}:${VERSION}" \
        --tag "${DOCKER_HUB_REPO}:latest" \
        --push \
        -f apps/agent/Dockerfile \
        apps/agent
