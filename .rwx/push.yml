on:
  github:
    push:
      init:
        commit-sha: ${{ event.git.sha }}
      status-checks:
        name: CI
  cli:
    init:
      commit-sha: ${{ event.git.sha }}

base:
  image: ubuntu:24.04
  config: rwx/base 1.0.2

# Per the RWX CI reference (https://www.rwx.com/docs/guides/ci): toolchain
# installs MUST be their own top-level tasks so RWX caches each install
# layer separately and reuses it across runs (inlining `call: ...` inside
# a CI task's `run:` would force a fresh install on every cache miss).
#
# Each CI task `filter:` is its own app dir + lockfile/config + this
# push.yml — so changes outside the filter set don't bust its cache.
#
# We group each toolchain task directly above its single consumer so the
# file reads top-to-bottom by app.

tasks:
  - key: code
    call: git/clone 2.0.7
    with:
      repository: https://github.com/JackKora/yaaos.git
      ref: ${{ init.commit-sha }}

  - key: docs-ci
    use: [code]
    # Unfiltered: walks markdown across the whole repo and resolves link
    # targets via `git ls-files`, so a restrictive filter risks false
    # negatives on linked non-markdown files. Cheap task — pure Python
    # stdlib, no Docker.
    run: |
      python3 apps/backend/bin/check_doc_links

  # ─── backend ────────────────────────────────────────────────────────

  - key: system-packages-backend
    # Backend's python-xmlsec binds to libxmlsec1 + libxml2/libxslt at
    # build time. Only the backend CI needs these.
    run: |
      sudo apt-get update
      sudo apt-get install -y --no-install-recommends \
        libxmlsec1-dev xmlsec1 pkg-config libxml2-dev libxslt1-dev
      sudo apt-get clean

  - key: python
    # python is the backend's primary toolchain; web-ci and agent-ci also
    # `use:` it for the semgrep step. Pinned to 3.13.11 to match the
    # project's `requires-python = ">=3.13,<3.14"`. The `python/install`
    # package requires a full patch version (not "3.13") and Ubuntu 24.04
    # has 3.13.0–3.13.11 available per known-pythons-os-base.csv.
    call: python/install 1.4.4
    with:
      python-version: "3.13.11"

  - key: backend-ci
    use: [code, system-packages-backend, python]
    filter:
      - apps/backend/**
      - pyproject.toml
      - uv.lock
      - docker/docker-compose.test.yml
      - .rwx/push.yml
    docker: true
    # Docker is on only so `docker compose` can bring up postgres + redis
    # services. The test runner itself runs natively on the Ubuntu agent.
    # Compose maps postgres → host :55432 and redis → host :56379 (see
    # docker-compose.test.yml).
    run: |
      set -e
      # Capture compose file as an absolute path BEFORE any `cd`, so the
      # EXIT trap finds it after bin/ci cds into apps/backend/.
      COMPOSE_FILE="$(pwd)/docker/docker-compose.test.yml"
      curl -LsSf https://astral.sh/uv/install.sh | sh
      export PATH="$HOME/.local/bin:$PATH"
      docker compose -f "$COMPOSE_FILE" up -d --wait postgres redis
      trap "docker compose -f '$COMPOSE_FILE' down -v" EXIT
      export DATABASE_URL="postgresql+asyncpg://yaaos:yaaos@localhost:55432/yaaos"
      export REDIS_URL="redis://localhost:56379/0"
      export YAAOS_ENV=dev
      cd apps/backend && bin/ci
    outputs:
      test-results:
        - path: apps/backend/tmp/pytest-reportlog.json
          options:
            language: Python
            framework: pytest

  # ─── web ────────────────────────────────────────────────────────────

  - key: nodejs
    call: nodejs/install 1.1.14
    with:
      node-version: "22.11.0"

  - key: pnpm-install
    use: [code, nodejs]
    # Workspace-wide pnpm install. node_modules at every workspace
    # package + pnpm's content-addressable store are baked into this
    # task's layer. `web-ci`, `e2e-ci`, and `playwright-install` all
    # `use:` this so the install runs once per lockfile change, not once
    # per CI task per push.
    filter:
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - apps/*/package.json
      - .rwx/push.yml
    run: |
      set -e
      corepack enable
      corepack prepare pnpm@9.12.3 --activate
      pnpm install --frozen-lockfile

  - key: web-ci
    use: [code, nodejs, python, pnpm-install]
    filter:
      - apps/web/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .semgrepignore
      - .rwx/push.yml
    # `python` is `use:`d here so semgrep (run from apps/web/bin/ci) is
    # available. `pnpm-install` provides node_modules; corepack-enabled
    # `pnpm` shim comes from the nodejs distribution.
    run: |
      set -e
      pip install --quiet semgrep
      corepack enable
      cd apps/web && bin/ci
    outputs:
      test-results:
        - path: apps/web/tmp/vitest.json
          options:
            language: JavaScript
            framework: Vitest

  # ─── agent ──────────────────────────────────────────────────────────

  - key: golang
    call: golang/install 1.2.1
    with:
      go-version: "1.25.10"

  - key: agent-ci
    use: [code, golang, python]
    filter:
      - apps/agent/**
      - apps/backend/openapi/agent-api.yaml
      - .rwx/push.yml
    # Go is hermetic — runs natively. Tooling installed inline:
    # golangci-lint (official install script, v2.x), govulncheck
    # (go install), semgrep (pip). CGO + race detector work on Ubuntu's
    # default gcc, so the alpine-specific CGO_ENABLED=1 from the old
    # Docker-based config is no longer needed.
    run: |
      set -e
      export PATH="/usr/local/go/bin:$(go env GOPATH 2>/dev/null || echo $HOME/go)/bin:$PATH"
      curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
        | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
      go install golang.org/x/vuln/cmd/govulncheck@latest
      pip install --quiet semgrep
      cd apps/agent && bin/ci

  # ─── e2e ────────────────────────────────────────────────────────────

  - key: playwright-install
    use: [code, nodejs, pnpm-install]
    # Cache the Playwright browser binaries (~/.cache/ms-playwright/).
    # Keyed on apps/e2e/package.json so a Playwright version bump
    # re-fetches; otherwise this task is a cache hit across pushes.
    filter:
      - apps/e2e/package.json
      - pnpm-lock.yaml
      - .rwx/push.yml
    run: |
      set -e
      corepack enable
      pnpm --filter @yaaos/e2e exec playwright install --with-deps chromium

  - key: e2e-ci
    use: [code, nodejs, pnpm-install, playwright-install]
    # Broad filter: e2e exercises the integrated test compose stack —
    # backend (web + worker images), web (SPA baked into the image), the
    # three fake-* services, the compose file itself, and workspace
    # lockfiles. Agent-only changes don't trigger this; agent isn't part
    # of the e2e stack.
    filter:
      - apps/backend/**
      - apps/web/**
      - apps/e2e/**
      - apps/fake-github/**
      - apps/fake-linear/**
      - apps/fake-notion/**
      - docker/docker-compose.test.yml
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - pyproject.toml
      - uv.lock
      - .rwx/push.yml
    docker: true
    # Docker is on so `apps/e2e/bin/ci` can `docker compose up --build`
    # the test stack. Playwright runs natively on the Ubuntu agent.
    # `pnpm-install` + `playwright-install` are cached layers shared
    # across pushes; only the compose-stack rebuild + the suite itself
    # are uncached cost.
    run: |
      set -e
      corepack enable
      apps/e2e/bin/ci
