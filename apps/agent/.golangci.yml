# golangci-lint v2 config for the yaaos WorkspaceAgent.
#
# Enabled set is the standard high-signal Go linters plus a few extras
# (bodyclose for HTTP-client safety, gocritic for diagnostic checks,
# revive as a faster golint successor, depguard for layer-boundary
# enforcement, exhaustive for enum-switch completeness). gosimple was
# merged into staticcheck in v2 so it's no longer a separate linter.

version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - revive
    - bodyclose
    - gocritic
    - depguard
    - exhaustive
  # revive's `exported` and `package-comments` rules require a doc comment
  # on every exported symbol / package. Disable both and keep revive's
  # higher-signal defaults (var-naming, early-return, unused-parameter,
  # etc.).
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
    exhaustive:
      # A switch with a `default` case is considered exhaustive. Used for
      # command.Decode whose default returns an error on unknown kinds.
      default-signifies-exhaustive: true
    depguard:
      rules:
        # Per-module strict allow-lists. Each rule permits only $gostd, the
        # third-party packages the module actually imports, and the internal
        # packages the layer graph explicitly grants it. Everything else is
        # blocked by list-mode: strict. See apps/agent/docs/architecture.md
        # for the declared layer graph this enforces.

        protocol:
          list-mode: strict
          files:
            - "**/internal/protocol/**"
          allow:
            - $gostd
            - gopkg.in/yaml.v3

        command:
          list-mode: strict
          files:
            - "**/internal/command/**"
          allow:
            - $gostd
            - github.com/yaaos/agent/internal/command
            - github.com/yaaos/agent/internal/protocol
            - github.com/yaaos/agent/internal/secret

        activity:
          list-mode: strict
          files:
            - "**/internal/activity/**"
          allow:
            - $gostd
            - github.com/coder/websocket
            - github.com/yaaos/agent/internal/protocol

        workspace:
          list-mode: strict
          files:
            - "**/internal/workspace/**"
          allow:
            - $gostd
            - go.opentelemetry.io/otel/attribute
            - github.com/yaaos/agent/internal/command
            - github.com/yaaos/agent/internal/ipc
            - github.com/yaaos/agent/internal/protocol
            - github.com/yaaos/agent/internal/secret
            - github.com/yaaos/agent/internal/tracing
            - github.com/yaaos/agent/internal/workspace/workspacetest

        supervisor:
          list-mode: strict
          files:
            - "**/internal/supervisor/**"
          allow:
            - $gostd
            - github.com/coder/websocket
            - go.opentelemetry.io/otel/attribute
            - go.opentelemetry.io/otel/metric
            - go.opentelemetry.io/otel/trace
            - github.com/yaaos/agent/internal/activity
            - github.com/yaaos/agent/internal/backoff
            - github.com/yaaos/agent/internal/command
            - github.com/yaaos/agent/internal/identity
            - github.com/yaaos/agent/internal/ipc
            - github.com/yaaos/agent/internal/observability
            - github.com/yaaos/agent/internal/protocol
            - github.com/yaaos/agent/internal/tracing
            - github.com/yaaos/agent/internal/workspace
            - github.com/yaaos/agent/internal/supervisor/supervisortest
            - github.com/yaaos/agent/internal/workspace/workspacetest

        backoff:
          list-mode: strict
          files:
            - "**/internal/backoff/**"
          allow:
            - $gostd

        secret:
          list-mode: strict
          files:
            - "**/internal/secret/**"
          allow:
            - $gostd

        ipc:
          list-mode: strict
          files:
            - "**/internal/ipc/**"
          allow:
            - $gostd

        logging:
          list-mode: strict
          files:
            - "**/internal/logging/**"
          allow:
            - $gostd
            - gopkg.in/natefinch/lumberjack.v2

        observability:
          list-mode: strict
          files:
            - "**/internal/observability/**"
          allow:
            - $gostd
            - go.opentelemetry.io/contrib/bridges/otelslog
            - go.opentelemetry.io/otel
            - go.opentelemetry.io/otel/attribute
            - go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp
            - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp
            - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp
            - go.opentelemetry.io/otel/metric
            - go.opentelemetry.io/otel/propagation
            - go.opentelemetry.io/otel/sdk/log
            - go.opentelemetry.io/otel/sdk/metric
            - go.opentelemetry.io/otel/sdk/resource
            - go.opentelemetry.io/otel/sdk/trace
            - go.opentelemetry.io/otel/sdk/trace/tracetest
            - go.opentelemetry.io/otel/semconv/v1.40.0

        identity:
          list-mode: strict
          files:
            - "**/internal/identity/**"
          allow:
            - $gostd
            - github.com/aws/aws-sdk-go-v2/aws/signer/v4
            - github.com/aws/aws-sdk-go-v2/config
            - github.com/aws/aws-sdk-go-v2/credentials/ec2rolecreds

        tracing:
          list-mode: strict
          files:
            - "**/internal/tracing/**"
          allow:
            - $gostd
            - go.opentelemetry.io/otel
            - go.opentelemetry.io/otel/attribute
            - go.opentelemetry.io/otel/codes
            - go.opentelemetry.io/otel/propagation
            - go.opentelemetry.io/otel/sdk/trace
            - go.opentelemetry.io/otel/sdk/trace/tracetest
            - go.opentelemetry.io/otel/trace
            - go.opentelemetry.io/otel/trace/noop

        cmd_agent:
          list-mode: strict
          files:
            - "**/cmd/agent/**"
          allow:
            - $gostd
            - go.opentelemetry.io/contrib/instrumentation/net/http/otelhttp
            - github.com/yaaos/agent/internal/identity
            - github.com/yaaos/agent/internal/logging
            - github.com/yaaos/agent/internal/observability
            - github.com/yaaos/agent/internal/protocol
            - github.com/yaaos/agent/internal/supervisor
            - github.com/yaaos/agent/internal/workspace

        # ── Test-seam sub-packages ─────────────────────────────────────────
        # Each rule has two parts:
        #   1. A strict allow-list for files inside the sub-package itself.
        #   2. A quarantine rule that denies non-_test.go files from importing
        #      the sub-package agent-wide.

        workspacetest:
          list-mode: strict
          files:
            - "**/internal/workspace/workspacetest/**"
          allow:
            - $gostd
            - github.com/yaaos/agent/internal/command
            - github.com/yaaos/agent/internal/protocol

        quarantine_workspacetest:
          files:
            - "**/*.go"
            - "!**/*_test.go"
            - "!**/internal/workspace/workspacetest/**"
          deny:
            - pkg: github.com/yaaos/agent/internal/workspace/workspacetest
              desc: "workspacetest is a test-only seam; import only from _test.go files"

        supervisortest:
          list-mode: strict
          files:
            - "**/internal/supervisor/supervisortest/**"
          allow:
            - $gostd
            - github.com/yaaos/agent/internal/command
            - github.com/yaaos/agent/internal/ipc
            - github.com/yaaos/agent/internal/protocol
            - github.com/yaaos/agent/internal/workspace
            - github.com/yaaos/agent/internal/workspace/workspacetest

        quarantine_supervisortest:
          files:
            - "**/*.go"
            - "!**/*_test.go"
            - "!**/internal/supervisor/supervisortest/**"
          deny:
            - pkg: github.com/yaaos/agent/internal/supervisor/supervisortest
              desc: "supervisortest is a test-only seam; import only from _test.go files"

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose

formatters:
  enable:
    - gofmt
    - goimports
