openapi: 3.1.0
info:
  title: yaaos WorkspaceAgent wire protocol
  version: 0.1.0
  summary: |
    HTTPS long-poll protocol between the customer-deployed WorkspaceAgent
    (`apps/agent/`, Go) and the yaaos control plane (`core/agent_gateway`).

    Five HTTPS endpoints carry command-and-control: identity exchange,
    heartbeat (+ workspace inventory), command claim (long-poll),
    workspace-state events, and AgentCommand events. A separate WebSocket
    `WSS /api/v1/agents/{id}/activity` carries high-frequency CodingAgent
    ActivityEvents back to the control plane; that channel is specified
    separately and is not part of this file.

    Every AgentCommand and AgentEvent carries `traceparent` (W3C trace
    context) so spans nest correctly across the wire.

    This spec is hand-written. The in-tree types under
    `app/core/agent_gateway/types.py` are the canonical Pydantic mirror;
    codegen (Pydantic on the backend, oapi-codegen on the Go side) can
    consume this file. A drift-detection test
    (`app/core/agent_gateway/test/test_openapi_mirror_drift.py`)
    catches add/rename/remove between this spec and the Pydantic mirror.

servers:
  - url: https://agent.yaaos.dev
    description: production
  - url: http://localhost:8080
    description: local dev

paths:
  /api/v1/agent/identity:
    post:
      summary: Exchange a SigV4-signed STS request for a short-lived bearer.
      description: |
        Vault AWS-auth pattern. The agent submits a sigv4-signed
        `GetCallerIdentity` request (in `payload`) that the control plane
        replays against AWS STS (or mock-aws in dev/test). On success it
        derives the `instance_id` from the assumed-role ARN's
        role-session-name, find-or-creates a `workspace_agents` row keyed
        on `(org_id, instance_id)`, and issues a 1-hour bearer.
      operationId: exchangeIdentity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentityExchangeRequest'
      responses:
        '200':
          description: Bearer issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityExchangeResponse'
        '401':
          description: Signature did not verify.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/agents/{agent_id}/heartbeat:
    post:
      summary: Supervisor liveness + workspace inventory reconciliation.
      operationId: heartbeat
      parameters:
        - $ref: '#/components/parameters/AgentId'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HeartbeatRequest'
      responses:
        '200':
          description: Acknowledged. Body carries reconciliation hints.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeartbeatResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/agents/{agent_id}/commands/claim:
    post:
      summary: Long-poll for an AgentCommand. Returns 204 when no work.
      description: |
        Long-poll up to ~30s (configurable via `wait_seconds`, capped at
        55s). Returns a single AgentCommand when one becomes available;
        otherwise 204 No Content so the agent can re-arm the poll.
      operationId: claimCommand
      parameters:
        - $ref: '#/components/parameters/AgentId'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClaimRequest'
      responses:
        '200':
          description: AgentCommand to execute.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentCommand'
        '204':
          description: No work available within `wait_seconds`.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/workspaces/{workspace_id}/events:
    post:
      summary: Report a workspace-state transition scoped to a command_id.
      description: |
        The supervisor reports workspace state changes (created, expired,
        destroyed, failed) so the control plane can update its mirror.
        Scoped to the `command_id` that drove the transition so the
        stale-claim guard can fail mismatched events with 410.
      operationId: postWorkspaceEvent
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceEvent'
      responses:
        '200':
          description: Accepted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '410':
          $ref: '#/components/responses/StaleClaim'

  /api/v1/commands/{command_id}/events:
    post:
      summary: Report AgentCommand progress + terminal result.
      description: |
        Triggers every registered agent-event consumer (`domain/pipelines.handle_agent_event`) when the event is
        terminal. The control plane validates `command_id` against the
        workspace's `current_command_id` (single-flight claim); a stale
        command (workspace already moved on) is recorded as
        `stale_claim_dropped` in the response body — always 200.
      operationId: postCommandEvent
      parameters:
        - $ref: '#/components/parameters/CommandId'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentEvent'
      responses:
        '200':
          description: Event was processed. The `command_event_outcome` field classifies the result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandEventAck'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  parameters:
    AgentId:
      name: agent_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkspaceId:
      name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CommandId:
      name: command_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Missing or invalid bearer.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    StaleClaim:
      description: |
        The workspace's `current_command_id` no longer matches the event's
        `command_id` — the claim has rotated. Used by
        `/api/v1/workspaces/{workspace_id}/events`; the command-event endpoint
        uses the 200 + `CommandEventAck` shape instead.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    CommandEventAck:
      type: object
      required: [command_event_outcome]
      properties:
        command_event_outcome:
          type: string
          enum: [event_recorded, stale_claim_dropped]
          description: |
            - `event_recorded`: the event was persisted and any run side-effects fired.
            - `stale_claim_dropped`: the backend no longer holds this command's claim (workspace moved on or command row was reaped); the agent should treat this as a successful no-op and stop retrying.

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
        detail:
          type: string

    AgentMetadata:
      type: object
      properties:
        os:
          type: string
          description: Operating system (e.g. "linux", "darwin").
        cpu_count:
          type: integer
          description: Number of logical CPUs.
        memory_bytes:
          type: integer
          format: int64
          description: Total system memory in bytes.

    IdentityExchangeRequest:
      type: object
      required: [kind, payload]
      properties:
        kind:
          type: string
          description: Signing mechanism. Today only "aws-sts" is supported.
          example: aws-sts
        agent_version:
          type: string
          description: Agent binary version (semver).
        agent_metadata:
          $ref: '#/components/schemas/AgentMetadata'
        payload:
          type: string
          description: |
            JSON-encoded sigv4-signed STS GetCallerIdentity envelope. Shape:
            {"url":"https://sts.amazonaws.com/","headers":{...},"body":"Action=GetCallerIdentity&Version=2011-06-15"}.
            The `X-Yaaos-Audience` header inside the envelope must match the
            backend's Host header (audience binding).

    IdentityExchangeResponse:
      type: object
      required: [bearer, expires_at, renewal_after, agent_id, instance_id, org_id]
      properties:
        bearer:
          type: string
          description: Short-lived bearer to send in `Authorization` for all subsequent calls.
        expires_at:
          type: string
          format: date-time
          description: When the bearer expires. Agent must re-exchange before this.
        renewal_after:
          type: string
          format: date-time
          description: Suggested renewal time (5 min before expires_at). Agent should renew at this time.
        agent_id:
          type: string
          format: uuid
          description: |
            Per-pod row id in `workspace_agents`. Stable across restarts when
            the ECS task reuses the same session name.
        instance_id:
          type: string
          description: |
            Role-session-name extracted from the STS assumed-role ARN. The
            backend derives this; the agent never supplies it. Stable across
            pod restarts when the session name is reused.
        org_id:
          type: string
          format: uuid
          description: |
            Organisation this agent pod belongs to. Pinned by the supervisor
            on first exchange; a mismatch on renewal is an identity-integrity
            violation and triggers a fatal exit.

    HeartbeatRequest:
      type: object
      required: [reported_at, workspaces]
      properties:
        reported_at:
          type: string
          format: date-time
        workspaces:
          type: array
          items:
            $ref: '#/components/schemas/HeartbeatWorkspaceEntry'

    HeartbeatWorkspaceEntry:
      type: object
      required: [workspace_id, status]
      properties:
        workspace_id:
          type: string
          format: uuid
        status:
          type: string
          description: Agent-side workspace status — `running | exited | unknown`.
        current_command_id:
          type: string
          format: uuid
          nullable: true

    HeartbeatResponse:
      type: object
      required: [reconciled_at]
      properties:
        reconciled_at:
          type: string
          format: date-time
        forgotten_workspaces:
          type: array
          description: Workspaces the control plane no longer knows about; agent should clean them up.
          items:
            type: string
            format: uuid

    ClaimRequest:
      type: object
      required: [wait_seconds]
      properties:
        wait_seconds:
          type: integer
          minimum: 0
          maximum: 55
          description: Long-poll horizon. 0 returns immediately if no work.
        lifecycle:
          type: string
          enum: [unconfigured, active, draining, shutdown]
          description: |
            Agent lifecycle state.
            `unconfigured` — agent has not yet received a ConfigUpdate; backend returns ConfigUpdateCommand.
            `active` — agent is ready for workspace commands; backend returns the first eligible queued command.
            `draining` — agent is draining; accepts no new workspaces (`new_workspaces=0`); still receives in-flight workspace commands and agent-scoped commands.
            `shutdown` — reserved; the agent itself never sends this on a claim (it exits before that).
          default: unconfigured
        new_workspaces:
          type: integer
          minimum: 0
          default: 0
          description: |
            Capacity for new ProvisionWorkspace commands: max_workspaces − current
            active count. The backend returns up to this many unassigned
            ProvisionWorkspace rows.
        workspace_ids:
          type: array
          items:
            type: string
            format: uuid
          description: |
            IDs of idle Active workspaces awaiting a command (a subset of the
            agent's running workspaces). The backend returns one pending command
            per named workspace_id.

    AgentCommand:
      oneOf:
        - $ref: '#/components/schemas/ProvisionWorkspaceCommand'
        - $ref: '#/components/schemas/WriteFilesCommand'
        - $ref: '#/components/schemas/RefreshWorkspaceAuthCommand'
        - $ref: '#/components/schemas/InvokeClaudeCodeCommand'
        - $ref: '#/components/schemas/InvokeCodexCommand'
        - $ref: '#/components/schemas/CleanupWorkspaceCommand'
        - $ref: '#/components/schemas/PushBranchCommand'
        - $ref: '#/components/schemas/ConfigUpdateCommand'
        - $ref: '#/components/schemas/ShutdownCommand'
        - $ref: '#/components/schemas/CancelShutdownCommand'
      discriminator:
        propertyName: kind
        mapping:
          ProvisionWorkspace: '#/components/schemas/ProvisionWorkspaceCommand'
          WriteFiles: '#/components/schemas/WriteFilesCommand'
          RefreshWorkspaceAuth: '#/components/schemas/RefreshWorkspaceAuthCommand'
          InvokeClaudeCode: '#/components/schemas/InvokeClaudeCodeCommand'
          InvokeCodex: '#/components/schemas/InvokeCodexCommand'
          CleanupWorkspace: '#/components/schemas/CleanupWorkspaceCommand'
          PushBranch: '#/components/schemas/PushBranchCommand'
          ConfigUpdate: '#/components/schemas/ConfigUpdateCommand'
          Shutdown: '#/components/schemas/ShutdownCommand'
          CancelShutdown: '#/components/schemas/CancelShutdownCommand'

    CommandBase:
      type: object
      required: [command_id, workspace_id, traceparent]
      properties:
        command_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        traceparent:
          type: string
          description: W3C trace context the agent restores when emitting child spans.
        completion_token:
          type: string
          nullable: true
          description: |
            Per-command completion capability token minted by the control plane
            at claim. The agent echoes it back on the terminal/progress AgentEvent;
            the backend verifies it (constant-time) before any side effect.
            Treated as a secret — never logged in cleartext.
        run_id:
          type: string
          format: uuid
          nullable: true
          description: |
            The pipeline run that dispatched this command. Stamped at
            enqueue time so agent-side spans can carry `run_id` without a
            separate lookup. NULL for agent-scoped commands (e.g. ConfigUpdate)
            that do not correlate to a run.

    ProvisionWorkspaceCommand:
      allOf:
        - $ref: '#/components/schemas/CommandBase'
        - type: object
          required: [kind, repo, history, auth, ttl_seconds, max_idle_seconds, git_user_name, git_user_email]
          properties:
            kind:
              type: string
              enum: [ProvisionWorkspace]
            repo:
              type: object
              required: [plugin_id, external_id, clone_url]
              properties:
                plugin_id:
                  type: string
                external_id:
                  type: string
                clone_url:
                  type: string
                head_sha:
                  type: string
                  nullable: true
                  description: |
                    Detached-pin checkout target — `git checkout --detach`,
                    the fork-safe fetch-by-SHA path review flows use.
                    Exactly one of head_sha / branch_name must be set.
                base_sha:
                  type: string
                  nullable: true
                branch_name:
                  type: string
                  nullable: true
                  description: |
                    Named work branch. The agent checks it out with `git
                    checkout -B`, tracking the remote branch when it
                    already exists (falls back to creating a fresh local
                    branch otherwise). Exactly one of head_sha /
                    branch_name must be set.
            history:
              type: integer
              description: Shallow-clone depth.
              minimum: 1
            auth:
              type: object
              required: [kind, token]
              properties:
                kind:
                  type: string
                  enum: [github_installation, oauth]
                token:
                  type: string
                  description: Treated as a secret; never logged in cleartext.
            ttl_seconds:
              type: integer
              minimum: 60
            max_idle_seconds:
              type: integer
              minimum: 60
            git_user_name:
              type: string
              description: |
                Commit identity the agent applies via `git config
                user.name` after clone. Backend-supplied constant (e.g.
                "yaaos") — not user-configurable; without it the first
                skill commit fails.
            git_user_email:
              type: string
              description: |
                Commit identity the agent applies via `git config
                user.email` after clone. Backend-supplied constant (e.g.
                "yaaos[bot]@users.noreply.github.com").

    WriteFilesCommand:
      allOf:
        - $ref: '#/components/schemas/CommandBase'
        - type: object
          required: [kind, files]
          properties:
            kind:
              type: string
              enum: [WriteFiles]
            files:
              type: array
              items:
                type: object
                required: [path, content]
                properties:
                  path:
                    type: string
                    description: |
                      Workspace-relative path. Supervisor rejects `..`
                      escapes and absolute paths before writing.
                  content:
                    type: string
                  mode:
                    type: string
                    description: POSIX file mode (e.g. `0644`).

    RefreshWorkspaceAuthCommand:
      allOf:
        - $ref: '#/components/schemas/CommandBase'
        - type: object
          required: [kind, new_token]
          properties:
            kind:
              type: string
              enum: [RefreshWorkspaceAuth]
            new_token:
              type: string

    InvokeClaudeCodeCommand:
      allOf:
        - $ref: '#/components/schemas/CommandBase'
        - type: object
          required: [kind, invocation, limits, skill_path]
          properties:
            kind:
              type: string
              enum: [InvokeClaudeCode]
            skill_path:
              type: string
              description: |
                Backend-computed conventional path of the named skill inside
                the checkout (`.claude/skills/<skill_name>/SKILL.md`). The
                agent stats this path before spawning claude; absent →
                `completed_failure` with `failure_reason="skill not found:
                <path>"`. Zero agent policy — the convention lives on the
                backend side.
            invocation:
              type: object
              description: |
                Claude-Code-specific payload owned by `domain/coding_agent`.
                Carries the cross-language contract (mode + context +
                prompt_config) plus an `exec` block with the literal
                argv + stdin + env the Go agent feeds to
                `workspace.RunStreaming`. The agent reads `exec` and
                ignores the contract-surface fields — they're there for
                observability + Pydantic-codegen.
              properties:
                mode:
                  type: string
                  enum: [review, incremental_review, verify_fix, stale_check, answer_question]
                context:
                  type: object
                  description: The mode-specific Pydantic context dumped as JSON.
                prompt_config:
                  type: object
                  properties:
                    model:
                      type: string
                    effort:
                      type: string
                exec:
                  type: object
                  required: [argv, stdin, env]
                  properties:
                    argv:
                      type: array
                      items: { type: string }
                      description: |
                        Full command + flags. argv[0] is the binary name
                        (`claude`) — resolved via PATH in the Go agent's
                        runtime image.
                    stdin:
                      type: string
                      description: |
                        Fully-rendered prompt body (incl. the schema
                        appendix that constrains the agent's response
                        to a strict JSON shape).
                    env:
                      type: object
                      additionalProperties: { type: string }
                      description: |
                        Secrets the agent merges into the subprocess
                        environment (e.g. ANTHROPIC_API_KEY).
            mcp_servers:
              type: array
              items:
                type: object
            limits:
              type: object
              required: [wallclock_seconds]
              properties:
                wallclock_seconds:
                  type: integer
                  minimum: 1
            result_spec:
              type: object
              description: Where the supervisor delivers raw output (typically `stdout`).

    InvokeCodexCommand:
      allOf:
        - $ref: '#/components/schemas/CommandBase'
        - type: object
          required: [kind, invocation, limits, skill_path]
          properties:
            kind:
              type: string
              enum: [InvokeCodex]
            invocation:
              type: object
              required: [exec]
              properties:
                exec:
                  type: object
                  required: [argv, stdin, env]
                  properties:
                    argv:
                      type: array
                      items: { type: string }
                      description: |
                        Full command + flags. argv[0] is the binary name
                        (`codex`) — resolved via PATH in the Go agent's
                        runtime image.
                    stdin:
                      type: string
                      description: Fully-rendered prompt body.
                    env:
                      type: object
                      additionalProperties: { type: string }
            limits:
              type: object
              required: [wallclock_seconds]
              properties:
                wallclock_seconds:
                  type: integer
                  minimum: 1
            result_spec:
              type: object
            skill_path:
              type: string
              description: |
                Checkout-relative path the agent stats before spawning.
                Convention: `.codex/skills/<skill_name>/SKILL.md`.
            output_schema_json:
              type: string
              nullable: true
              description: |
                JSON Schema string written to `$TMPDIR/<command_id>-schema.json`
                by RunCodex; `--output-schema <path>` is appended to argv.
                Null means no schema constraint.

    CleanupWorkspaceCommand:
      allOf:
        - $ref: '#/components/schemas/CommandBase'
        - type: object
          required: [kind]
          properties:
            kind:
              type: string
              enum: [CleanupWorkspace]

    PushBranchCommand:
      description: |
        Push-failure recovery only: a bare re-push of the workspace's current
        HEAD after a `refresh-auth` credential rotation, so claude is never
        re-run just to retry a push. `workspace_id` (on CommandBase) is
        required — the workspace is expected to already be on its named
        work branch by provision's checkout invariant.
      allOf:
        - $ref: '#/components/schemas/CommandBase'
        - type: object
          required: [kind]
          properties:
            kind:
              type: string
              enum: [PushBranch]

    AgentConfig:
      type: object
      required: [max_workspaces]
      properties:
        max_workspaces:
          type: integer
          minimum: 1
          description: |
            Cap on concurrent Active workspaces for this agent. Sourced from
            the org/global default; no per-agent column exists.
        otlp_endpoint:
          type: string
          description: OTLP/HTTP exporter endpoint. Empty string disables telemetry.
        otlp_token:
          type: string
          description: Authentication token for the OTLP endpoint. Treated as a secret; never log.
        otlp_dataset:
          type: string
          description: Dataset/service-name identifier for the OTLP exporter.
        environment:
          type: string
          description: |
            OTel `deployment.environment.name` resource attribute. Sourced
            from backend `Settings.environment` (required at boot). Stamped
            on every agent trace/metric/log so signals can be filtered by
            `local` / `staging` / `production` in Dash0.
        api_keys:
          type: object
          additionalProperties:
            type: string
          description: |
            Per-provider secrets (provider_id → token) the agent injects as
            env vars at Claude exec time (e.g. "anthropic" → ANTHROPIC_API_KEY).
            Treated as secrets; values are plaintext on the wire so the agent
            receives the real token. Never log.

    ConfigUpdateCommand:
      type: object
      required: [command_id, traceparent, kind, config]
      description: |
        Agent-scoped command delivering runtime configuration. Carries no
        workspace_id — applies globally to the agent process. Workspace
        commands are gated until the agent receives at least one ConfigUpdate.
      properties:
        command_id:
          type: string
          format: uuid
        traceparent:
          type: string
        kind:
          type: string
          enum: [ConfigUpdate]
        config:
          $ref: '#/components/schemas/AgentConfig'
        completion_token:
          type: string
          nullable: true
          description: |
            Per-command capability token minted at claim. Agent echoes it on
            the terminal AgentEvent; backend verifies it by hash before
            accepting the event. Absent when the command was not claimed via
            the normal FIFO path.

    ShutdownCommand:
      type: object
      required: [command_id, traceparent, kind]
      description: |
        Agent-scoped command requesting the agent to drain. Carries no workspace_id —
        applies globally to the agent process. When executed, the agent flips its
        local lifecycle to "draining", accelerates its heartbeat to 5s, and triggers
        a clean exit once all active workspaces have completed.
      properties:
        command_id:
          type: string
          format: uuid
        traceparent:
          type: string
        kind:
          type: string
          enum: [Shutdown]
        completion_token:
          type: string
          nullable: true
          description: Per-command capability token minted at claim. Agent echoes it on the terminal AgentEvent.
        run_id:
          type: string
          format: uuid
          nullable: true
          description: Always null for agent-scoped commands.

    CancelShutdownCommand:
      type: object
      required: [command_id, traceparent, kind]
      description: |
        Agent-scoped command cancelling an in-progress drain. Carries no workspace_id.
        When executed, the agent flips its local lifecycle back to "active" and resumes
        accepting new workspace commands.
      properties:
        command_id:
          type: string
          format: uuid
        traceparent:
          type: string
        kind:
          type: string
          enum: [CancelShutdown]
        completion_token:
          type: string
          nullable: true
          description: Per-command capability token minted at claim. Agent echoes it on the terminal AgentEvent.
        run_id:
          type: string
          format: uuid
          nullable: true
          description: Always null for agent-scoped commands.

    AgentEvent:
      type: object
      required: [command_id, kind, reported_at, traceparent]
      properties:
        command_id:
          type: string
          format: uuid
          description: Which AgentCommand this event reports against.
        kind:
          type: string
          enum:
            - progress
            - received
            - completed_success
            - completed_failure
            - completed_skipped
          description: |
            `progress` is non-terminal (streaming updates).
            `received` is non-terminal: the agent posts this as its first
            event for a claimed command to cancel the 30-second lease requeue
            (flips `claimed → delivered` on the command row).
            `completed_*` is terminal — the backend resolves the
            event-to-run correlation directly
            (`command_id → agent_commands.run_id`) and
            enqueues every registered agent-event consumer (`domain/pipelines.handle_agent_event`).
        outcome_label:
          type: string
          nullable: true
          description: Free-form label set on terminal events (`success | failure | <recovery-label>`).
        outputs:
          type: object
          description: Per-command typed outputs.
        failure_reason:
          type: string
          nullable: true
        attempt:
          type: integer
          minimum: 0
          description: Used by the stale-claim guard alongside command_id.
        reported_at:
          type: string
          format: date-time
        traceparent:
          type: string
        completion_token:
          type: string
          nullable: true
          description: |
            Echoed back from the command's `completion_token`. Verified
            (constant-time) against the stored per-command hash before any side
            effect. Treated as a secret — never logged in cleartext.
        artifact:
          type: object
          nullable: true
          description: |
            Agent-collected file content read from `$TMPDIR/<command_id>.md`
            after the InvokeClaudeCode subprocess exits. Null when the skill
            wrote no artifact file — a legitimate outcome for review
            invocations and non-completed main-skill outcomes.
          properties:
            body:
              type: string
        artifact_error:
          type: string
          nullable: true
          description: |
            Set when the artifact file exists but exceeds the agent's size
            cap (`ARTIFACT_MAX_BYTES = 2 * 1024 * 1024`) or otherwise
            couldn't be read — distinguishes "wrote none" (both fields null)
            from "wrote too much" (this field set, `artifact` null).

    WorkspaceEvent:
      type: object
      required: [workspace_id, command_id, kind, reported_at]
      properties:
        workspace_id:
          type: string
          format: uuid
        command_id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [created, ready, exited, destroyed, failed]
        message:
          type: string
        reported_at:
          type: string
          format: date-time
