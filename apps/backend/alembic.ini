[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = postgresql://yaaos:yaaos@localhost:5432/yaaos
# Authoring: `alembic revision --autogenerate -m "<msg>"` from apps/backend/.
# Boot path: `core/database.migrate()` drives `alembic.command.upgrade` programmatically.
# Manual operator use: `alembic upgrade head` is permitted.
# `sqlalchemy.url` below is ignored at runtime; `env.py` reads `settings.database_url`.
# The value remains so misconfigured CLI invocations fail loudly.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
